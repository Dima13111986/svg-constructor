<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power BI SVG Creator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg-primary: #080c18;
  --bg-secondary: #0e1424;
  --bg-panel: #121830;
  --bg-card: #182040;
  --bg-hover: #1c2650;
  --border: rgba(80,110,200,0.18);
  --border-strong: rgba(80,110,200,0.32);
  --border-active: #4f6ef7;
  --text-primary: #e4e9f4;
  --text-secondary: #8892b0;
  --text-muted: #5e6d8a;
  --accent: #4f6ef7;
  --accent-light: #7b9bff;
  --accent-glow: rgba(79,110,247,0.14);
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --sidebar-width: 250px;
  --topbar-height: 52px;
  --header-h: 42px;
  --radius: 0px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

/* ── SCROLLBARS (visible!) ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #0c1020; border-left: 1px solid rgba(79,110,247,0.12); }
::-webkit-scrollbar-thumb {
  background: #3a4a7a;
  border-radius: 6px;
  border: 1px solid #0c1020;
}
::-webkit-scrollbar-thumb:hover { background: #4f6494; }
* { scrollbar-width: auto; scrollbar-color: #3a4a7a #0c1020; }

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar-height);
  background: var(--bg-secondary);
  border-bottom: 2px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
}
.topbar-logo svg { width: 26px; height: 26px; }
.topbar-logo span.highlight { color: var(--accent-light); }

.topbar-actions { display: flex; align-items: center; gap: 6px; }

.btn-lang {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border-strong);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-lang:hover, .btn-lang.active {
  border-color: var(--accent);
  color: var(--accent-light);
  background: var(--accent-glow);
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  left: 0;
  top: var(--topbar-height);
  bottom: 0;
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 2px solid var(--border-strong);
  overflow-y: auto;
  z-index: 50;
  padding: 8px 0;
}

.sidebar-category { padding: 0 8px; margin-bottom: 2px; }

.sidebar-category-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 12px 12px 5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.sidebar-item {
  padding: 7px 12px;
  margin: 1px 0;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.sidebar-item.active {
  background: var(--accent-glow);
  color: var(--accent-light);
  font-weight: 500;
  border-left: 2.5px solid var(--accent);
}

.sidebar-item .item-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.sidebar-item.active .item-dot { background: var(--accent-light); }

/* ── MAIN GRID ── */
.main {
  margin-left: var(--sidebar-width);
  margin-top: var(--topbar-height);
  height: calc(100vh - var(--topbar-height));
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  grid-template-rows: 1fr 260px;
  gap: 0;
}

/* ── PANEL HEADERS ── */
.panel-header {
  height: var(--header-h);
  padding: 0 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-strong);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-header .visual-name {
  color: var(--accent-light);
  text-transform: none;
  letter-spacing: 0;
  font-size: 13px;
  font-weight: 500;
}

/* ── PREVIEW PANEL ── */
.preview-panel {
  background: var(--bg-panel);
  border-right: 2px solid var(--border-strong);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.preview-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: auto;
  background:
    radial-gradient(circle at 50% 50%, rgba(79,110,247,0.04) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(79,110,247,0.025) 19px, rgba(79,110,247,0.025) 20px),
    repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(79,110,247,0.025) 19px, rgba(79,110,247,0.025) 20px);
}

.preview-svg-container {
  background: #ffffff;
  border-radius: 10px;
  padding: 24px;
  box-shadow:
    0 2px 8px rgba(0,0,0,0.2),
    0 8px 32px rgba(0,0,0,0.25),
    0 0 0 1px rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 180px;
  min-height: 100px;
}
.preview-svg-container.dark-bg { background: #1a1a2e; }

/* ── CONTROLS PANEL ── */
.controls-panel {
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.controls-area {
  flex: 1;
  padding: 14px 16px;
  overflow-y: auto;
}

.control-group { margin-bottom: 14px; }

.control-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-secondary);
}

.control-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--accent-light);
  background: var(--accent-glow);
  padding: 1px 7px;
  border-radius: 4px;
}

input[type="range"] {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: #283460;
  border-radius: 4px;
  outline: none;
  border: 1px solid rgba(79,110,247,0.25);
}
input[type="range"]::-webkit-slider-runnable-track {
  height: 6px;
  background: #283460;
  border-radius: 4px;
  border: 1px solid rgba(79,110,247,0.25);
}
input[type="range"]::-moz-range-track {
  height: 6px;
  background: #283460;
  border-radius: 4px;
  border: 1px solid rgba(79,110,247,0.25);
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2.5px solid #1a2240;
  box-shadow: 0 0 0 3px rgba(79,110,247,0.25);
  margin-top: -7px;
  transition: box-shadow 0.15s;
}
input[type="range"]::-moz-range-thumb {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2.5px solid #1a2240;
  box-shadow: 0 0 0 3px rgba(79,110,247,0.25);
}
input[type="range"]::-webkit-slider-thumb:hover {
  box-shadow: 0 0 0 5px rgba(79,110,247,0.3);
}
input[type="range"]::-moz-range-thumb:hover {
  box-shadow: 0 0 0 5px rgba(79,110,247,0.3);
}

.color-control {
  display: flex;
  align-items: center;
  gap: 10px;
}
.color-control input[type="color"] {
  width: 34px; height: 26px;
  border: 1px solid var(--border-strong);
  border-radius: 5px;
  background: var(--bg-card);
  cursor: pointer;
  padding: 2px;
}
.color-hex {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.bg-toggle { display: flex; gap: 3px; }
.bg-toggle button {
  padding: 4px 10px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.bg-toggle button.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent-light);
}

/* ── DAX PANEL ── */
.dax-panel {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-top: 2px solid var(--border-strong);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.dax-panel .panel-header { flex-shrink: 0; }

.dax-textarea {
  flex: 1;
  width: 100%;
  background: var(--bg-primary);
  color: #b8c4d6;
  border: none;
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.65;
  resize: none;
  outline: none;
  overflow: auto;
}

.btn-copy {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid var(--border-strong);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-copy:hover { border-color: var(--green); color: var(--green); }
.copy-success { color: var(--green) !important; border-color: var(--green) !important; }

/* ── Sidebar toggle (mobile) ── */
.sidebar-toggle {
  display: none;
  width: 34px; height: 34px;
  border-radius: 6px; border: 1px solid var(--border-strong);
  background: var(--bg-card); color: var(--text-secondary);
  cursor: pointer; font-size: 16px; line-height: 1;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 45;
  backdrop-filter: blur(2px);
}
.sidebar-overlay.show { display: block; }

/* ── MOBILE ≤ 820px ── */
@media (max-width: 820px) {
  :root { --topbar-height: 48px; }
  body { overflow-y: auto; overflow-x: hidden; height: auto; }
  .sidebar-toggle { display: flex; }
  .sidebar {
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 55;
    width: 74vw; max-width: 300px;
  }
  .sidebar.open { transform: translateX(0); }
  .main {
    margin-left: 0;
    height: auto; min-height: calc(100dvh - var(--topbar-height));
    display: flex; flex-direction: column;
    overflow-x: hidden;
  }
  .preview-panel {
    border-right: none;
    border-bottom: 2px solid var(--border-strong);
    min-height: 260px; overflow: visible;
  }
  .preview-area { padding: 16px 10px; min-height: 200px; }
  .preview-svg-container { padding: 14px; min-width: unset; max-width: 100%; }
  .preview-svg-container svg { max-width: 100%; height: auto; }
  .controls-panel {
    border-bottom: 2px solid var(--border-strong);
    overflow: visible;
  }
  .controls-area { padding: 12px 14px; overflow: visible; }
  .dax-panel { grid-column: unset; height: auto; min-height: 240px; overflow: visible; }
  .dax-textarea { min-height: 200px; height: auto; }
  .topbar { padding: 0 10px; }
  .topbar-logo { font-size: 14px; gap: 6px; }
  .topbar-logo svg { width: 24px; height: 24px; }
  .btn-lang { padding: 4px 10px; font-size: 12px; }
  .panel-header { padding: 0 12px; font-size: 10px; }
}

/* ── TABLET ── */
@media (min-width: 821px) and (max-width: 1200px) {
  :root { --sidebar-width: 210px; }
  .main { grid-template-columns: 1.1fr 0.9fr; grid-template-rows: 1fr 240px; }
  .preview-area { padding: 18px 12px; }
  .preview-svg-container svg { max-width: 100%; height: auto; }
}
</style>
</head>

</div>

function t(key) {
  const keys = key.split('.');
  let val = i18n[currentLang];
  for (const k of keys) { val = val?.[k]; }
  return val || key;
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnUk').classList.toggle('active', lang === 'uk');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  renderSidebar();
  renderAll();
}

// ============================================================
//  SIDEBAR TOGGLE (mobile)
// ============================================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ============================================================
//  VISUAL DEFINITIONS
// ============================================================
const categories = [
  { id: 'kpi', visuals: ['kpi_basic','kpi_comparison','kpi_trend_arrow','kpi_mini_chart','kpi_dual'] },
  { id: 'gauge', visuals: ['gauge_circle','gauge_semi','gauge_speedometer','gauge_donut','gauge_multi'] },
  { id: 'progress', visuals: ['progress_linear','progress_stepped','progress_gradient','progress_segmented','progress_battery'] },
  { id: 'chart', visuals: ['chart_bar_h','chart_bar_v','chart_bullet','chart_waterfall','chart_sparkline'] },
  { id: 'status', visuals: ['status_traffic','status_icon','status_badge','status_dot','status_flag'] },
  { id: 'rating', visuals: ['rating_stars','rating_hearts','rating_bars','rating_numeric','rating_emoji'] },
  { id: 'trend', visuals: ['trend_arrow','trend_sparkline','trend_delta','trend_flame'] },
  { id: 'advanced', visuals: ['adv_thermometer','adv_funnel','adv_waffle','adv_pictogram','adv_radial_bar'] }
];

let currentVisual = 'kpi_basic';
let darkBg = false;

// Default control state per visual
let controls = {};

function getDefaults(vId) {
  const d = {
    value: 750000, target: 1000000, pct: 72, label: 'Sales',
    color1: '#4f6ef7', color2: '#e2e8f0', colorGood: '#34d399',
    colorWarn: '#fbbf24', colorBad: '#f87171', textColor: '#1e293b',
    min: 0, max: 100, thickness: 12, radius: 60, count: 5, rating: 3.5
  };
  // Visual-specific overrides
  if (vId.startsWith('gauge_')) { d.pct = 68; d.color1 = '#4f6ef7'; }
  if (vId.startsWith('progress_')) { d.pct = 65; d.color1 = '#4f6ef7'; }
  if (vId.startsWith('rating_')) { d.rating = 3.5; d.count = 5; d.color1 = '#fbbf24'; }
  if (vId === 'kpi_comparison') { d.pct = 12; }
  if (vId === 'chart_sparkline' || vId === 'trend_sparkline') { d.color1 = '#4f6ef7'; }
  if (vId === 'adv_waffle') { d.pct = 73; d.color1 = '#4f6ef7'; }
  if (vId === 'adv_funnel') { d.pct = 80; }
  if (vId === 'trend_flame') { d.pct = 85; d.color1 = '#fb923c'; }
  return d;
}

// ============================================================
//  SIDEBAR
// ============================================================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  categories.forEach(cat => {
    html += `<div class="sidebar-category">
      <div class="sidebar-category-title">${t('categories.' + cat.id)}</div>`;
    cat.visuals.forEach(v => {
      html += `<div class="sidebar-item ${v === currentVisual ? 'active' : ''}" onclick="selectVisual('${v}')">
        <span class="item-dot"></span>${t('visuals.' + v)}
      </div>`;
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

function selectVisual(vId) {
  currentVisual = vId;
  controls = getDefaults(vId);
  closeSidebar();
  renderSidebar();
  renderControls();
  renderPreview();
  generateDAX();
}

// ============================================================
//  CONTROLS RENDERING
// ============================================================
function renderControls() {
  const area = document.getElementById('controlsArea');
  const v = currentVisual;
  const c = controls;
  let html = '';

  const slider = (id, label, min, max, val, step = 1, fmt) => {
    const display = fmt ? fmt(val) : val;
    return `<div class="control-group">
      <div class="control-label"><span>${label}</span><span class="control-value">${display}</span></div>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${val}" oninput="updateControl('${id}', +this.value)">
    </div>`;
  };

  const color = (id, label, val) => {
    return `<div class="control-group">
      <div class="control-label"><span>${label}</span></div>
      <div class="color-control">
        <input type="color" value="${val}" oninput="updateControl('${id}', this.value)">
        <span class="color-hex">${val}</span>
      </div>
    </div>`;
  };

  const fmtK = v => v >= 1000 ? (v/1000).toFixed(0) + 'K' : v;
  const fmtPct = v => v + '%';

  // Common controls based on visual type
  if (v.startsWith('kpi_')) {
    html += slider('value', t('value'), 0, 2000000, c.value, 10000, fmtK);
    html += slider('target', t('target'), 100000, 3000000, c.target, 10000, fmtK);
    html += slider('pct', t('percentage'), -50, 150, c.pct, 1, fmtPct);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('colorGood', t('goodColor'), c.colorGood);
    html += color('colorBad', t('badColor'), c.colorBad);
  } else if (v.startsWith('gauge_')) {
    html += slider('pct', t('percentage'), 0, 100, c.pct, 1, fmtPct);
    html += slider('thickness', t('thickness'), 4, 30, c.thickness, 1);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('color2', t('secondaryColor'), c.color2);
    html += color('colorGood', t('goodColor'), c.colorGood);
    html += color('colorWarn', t('warnColor'), c.colorWarn);
    html += color('colorBad', t('badColor'), c.colorBad);
  } else if (v.startsWith('progress_')) {
    html += slider('pct', t('percentage'), 0, 100, c.pct, 1, fmtPct);
    html += slider('thickness', t('thickness'), 6, 40, c.thickness, 1);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('color2', t('secondaryColor'), c.color2);
  } else if (v.startsWith('chart_')) {
    html += slider('value', t('value'), 0, 1000000, c.value, 5000, fmtK);
    html += slider('target', t('target'), 100000, 2000000, c.target, 5000, fmtK);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('color2', t('secondaryColor'), c.color2);
  } else if (v.startsWith('status_')) {
    html += slider('pct', t('percentage'), 0, 100, c.pct, 1, fmtPct);
    html += color('colorGood', t('goodColor'), c.colorGood);
    html += color('colorWarn', t('warnColor'), c.colorWarn);
    html += color('colorBad', t('badColor'), c.colorBad);
  } else if (v.startsWith('rating_')) {
    html += slider('rating', t('rating'), 0, 5, c.rating, 0.5);
    html += slider('count', t('count'), 3, 10, c.count, 1);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('color2', t('secondaryColor'), c.color2);
  } else if (v.startsWith('trend_')) {
    html += slider('pct', t('percentage'), -100, 200, c.pct, 1, fmtPct);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('colorGood', t('goodColor'), c.colorGood);
    html += color('colorBad', t('badColor'), c.colorBad);
  } else if (v.startsWith('adv_')) {
    html += slider('pct', t('percentage'), 0, 100, c.pct, 1, fmtPct);
    html += slider('value', t('value'), 0, 1000000, c.value, 5000, fmtK);
    html += color('color1', t('primaryColor'), c.color1);
    html += color('color2', t('secondaryColor'), c.color2);
    html += color('colorGood', t('goodColor'), c.colorGood);
  }

  area.innerHTML = html;
}

function updateControl(id, val) {
  controls[id] = val;
  renderPreview();
  generateDAX();
  // Update displayed value
  renderControls();
}

function setBg(mode) {
  darkBg = mode === 'dark';
  document.getElementById('bgLight').classList.toggle('active', !darkBg);
  document.getElementById('bgDark').classList.toggle('active', darkBg);
  document.getElementById('svgContainer').classList.toggle('dark-bg', darkBg);
}

// ============================================================
//  SVG GENERATORS
// ============================================================
function generateSVG(vId, c) {
  const tc = darkBg ? '#e8ecf4' : '#1e293b';
  const tc2 = darkBg ? '#8892b0' : '#64748b';

  switch(vId) {

    // ========== KPI ==========
    case 'kpi_basic': {
      const fv = c.value >= 1000000 ? (c.value/1000000).toFixed(1)+'M' : c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const ft = c.target >= 1000000 ? (c.target/1000000).toFixed(1)+'M' : c.target >= 1000 ? (c.target/1000).toFixed(0)+'K' : c.target;
      const pct = Math.round(c.value / c.target * 100);
      const col = pct >= 100 ? c.colorGood : pct >= 70 ? '#fbbf24' : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='280' height='140' viewBox='0 0 280 140'>
        <rect width='280' height='140' rx='10' fill='${darkBg?"#1e1e2e":"#ffffff"}' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1'/>
        <text x='20' y='32' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' font-weight='500'>${c.label || 'Sales'}</text>
        <text x='20' y='72' font-family='Segoe UI, sans-serif' font-size='34' fill='${tc}' font-weight='700'>$${fv}</text>
        <text x='20' y='96' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc2}'>${currentLang==='uk'?'Ціль':'Target'}: $${ft}</text>
        <rect x='20' y='112' width='240' height='8' rx='4' fill='${darkBg?"#2a2a3e":"#e2e8f0"}'/>
        <rect x='20' y='112' width='${Math.min(pct, 100) * 2.4}' height='8' rx='4' fill='${col}'/>
        <text x='260' y='96' font-family='Segoe UI, sans-serif' font-size='13' fill='${col}' text-anchor='end' font-weight='600'>${pct}%</text>
      </svg>`;
    }

    case 'kpi_comparison': {
      const fv = c.value >= 1000000 ? (c.value/1000000).toFixed(1)+'M' : c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const isPos = c.pct >= 0;
      const col = isPos ? c.colorGood : c.colorBad;
      const arrow = isPos ? '▲' : '▼';
      return `<svg xmlns='http://www.w3.org/2000/svg' width='260' height='120' viewBox='0 0 260 120'>
        <rect width='260' height='120' rx='10' fill='${darkBg?"#1e1e2e":"#ffffff"}' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1'/>
        <text x='20' y='30' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' font-weight='500'>${c.label || 'Revenue'}</text>
        <text x='20' y='68' font-family='Segoe UI, sans-serif' font-size='32' fill='${tc}' font-weight='700'>$${fv}</text>
        <rect x='20' y='82' width='${60 + Math.abs(c.pct)*0.5}' height='24' rx='12' fill='${col}' opacity='0.15'/>
        <text x='32' y='99' font-family='Segoe UI, sans-serif' font-size='13' fill='${col}' font-weight='600'>${arrow} ${Math.abs(c.pct)}% vs ${currentLang==='uk'?'мин.':'prev.'}</text>
      </svg>`;
    }

    case 'kpi_trend_arrow': {
      const fv = c.value >= 1000000 ? (c.value/1000000).toFixed(1)+'M' : c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const pct = Math.round(c.value / c.target * 100);
      const col = pct >= 100 ? c.colorGood : pct >= 70 ? '#fbbf24' : c.colorBad;
      const arrowY = pct >= 100 ? 'M220 70 L235 50 L250 70' : pct >= 70 ? 'M220 60 L250 60' : 'M220 50 L235 70 L250 50';
      return `<svg xmlns='http://www.w3.org/2000/svg' width='280' height='110' viewBox='0 0 280 110'>
        <rect width='280' height='110' rx='10' fill='${darkBg?"#1e1e2e":"#ffffff"}' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1'/>
        <text x='20' y='30' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' font-weight='500'>${c.label || 'KPI'}</text>
        <text x='20' y='68' font-family='Segoe UI, sans-serif' font-size='32' fill='${tc}' font-weight='700'>$${fv}</text>
        <text x='20' y='92' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc2}'>${pct}% ${currentLang==='uk'?'досягнення':'achieved'}</text>
        <path d='${arrowY}' stroke='${col}' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
      </svg>`;
    }

    case 'kpi_mini_chart': {
      const fv = c.value >= 1000000 ? (c.value/1000000).toFixed(1)+'M' : c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const pts = [40, 55, 45, 65, 58, 72, 68, 80, 75, c.pct];
      const maxP = Math.max(...pts);
      const sparkPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${20 + i * 24},${95 - (p / maxP) * 40}`).join(' ');
      const col = c.pct >= 70 ? c.colorGood : c.pct >= 40 ? '#fbbf24' : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='280' height='140' viewBox='0 0 280 140'>
        <rect width='280' height='140' rx='10' fill='${darkBg?"#1e1e2e":"#ffffff"}' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1'/>
        <text x='20' y='30' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' font-weight='500'>${c.label || 'Trend'}</text>
        <text x='20' y='58' font-family='Segoe UI, sans-serif' font-size='26' fill='${tc}' font-weight='700'>$${fv}</text>
        <path d='${sparkPath}' stroke='${col}' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
        <circle cx='${20 + 9 * 24}' cy='${95 - (c.pct / maxP) * 40}' r='3' fill='${col}'/>
        <rect x='20' y='110' width='240' height='6' rx='3' fill='${darkBg?"#2a2a3e":"#e2e8f0"}'/>
        <rect x='20' y='110' width='${Math.min(c.pct, 100) * 2.4}' height='6' rx='3' fill='${col}'/>
      </svg>`;
    }

    case 'kpi_dual': {
      const fv = c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const ft = c.target >= 1000 ? (c.target/1000).toFixed(0)+'K' : c.target;
      const p1 = Math.round(c.value / c.target * 100);
      const p2 = Math.round(c.target / (c.target * 1.3) * 100);
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='130' viewBox='0 0 300 130'>
        <rect width='300' height='130' rx='10' fill='${darkBg?"#1e1e2e":"#ffffff"}' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1'/>
        <rect x='20' y='15' width='120' height='100' rx='8' fill='${darkBg?"#252545":"#f8fafc"}'/>
        <text x='80' y='40' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}' text-anchor='middle'>Actual</text>
        <text x='80' y='68' font-family='Segoe UI, sans-serif' font-size='24' fill='${c.color1}' text-anchor='middle' font-weight='700'>$${fv}</text>
        <text x='80' y='90' font-family='Segoe UI, sans-serif' font-size='12' fill='${p1>=100?c.colorGood:c.colorBad}' text-anchor='middle' font-weight='600'>${p1}%</text>
        <rect x='160' y='15' width='120' height='100' rx='8' fill='${darkBg?"#252545":"#f8fafc"}'/>
        <text x='220' y='40' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}' text-anchor='middle'>Target</text>
        <text x='220' y='68' font-family='Segoe UI, sans-serif' font-size='24' fill='${tc}' text-anchor='middle' font-weight='700'>$${ft}</text>
        <text x='220' y='90' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' text-anchor='middle' font-weight='600'>${p2}%</text>
      </svg>`;
    }

    // ========== GAUGE ==========
    case 'gauge_circle': {
      const r = c.radius || 55;
      const circ = 2 * Math.PI * r;
      const offset = circ - (c.pct / 100) * circ;
      const col = c.pct >= 80 ? c.colorGood : c.pct >= 50 ? c.colorWarn : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'>
        <circle cx='90' cy='90' r='${r}' stroke='${darkBg?"#2a2a3e":c.color2}' stroke-width='${c.thickness}' fill='none'/>
        <circle cx='90' cy='90' r='${r}' stroke='${col}' stroke-width='${c.thickness}' fill='none'
          stroke-dasharray='${circ}' stroke-dashoffset='${offset}' stroke-linecap='round'
          transform='rotate(-90 90 90)'/>
        <text x='90' y='85' font-family='Segoe UI, sans-serif' font-size='28' fill='${tc}' text-anchor='middle' font-weight='700'>${c.pct}%</text>
        <text x='90' y='108' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}' text-anchor='middle'>${currentLang==='uk'?'Прогрес':'Progress'}</text>
      </svg>`;
    }

    case 'gauge_semi': {
      const r = 65;
      const halfCirc = Math.PI * r;
      const offset = halfCirc - (c.pct / 100) * halfCirc;
      const col = c.pct >= 80 ? c.colorGood : c.pct >= 50 ? c.colorWarn : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='130' viewBox='0 0 200 130'>
        <path d='M 30 110 A 65 65 0 0 1 170 110' stroke='${darkBg?"#2a2a3e":c.color2}' stroke-width='${c.thickness}' fill='none' stroke-linecap='round'/>
        <path d='M 30 110 A 65 65 0 0 1 170 110' stroke='${col}' stroke-width='${c.thickness}' fill='none' stroke-linecap='round'
          stroke-dasharray='${halfCirc}' stroke-dashoffset='${offset}'/>
        <text x='100' y='100' font-family='Segoe UI, sans-serif' font-size='28' fill='${tc}' text-anchor='middle' font-weight='700'>${c.pct}%</text>
        <text x='30' y='125' font-family='Segoe UI, sans-serif' font-size='10' fill='${tc2}'>0</text>
        <text x='170' y='125' font-family='Segoe UI, sans-serif' font-size='10' fill='${tc2}' text-anchor='end'>100</text>
      </svg>`;
    }

    case 'gauge_speedometer': {
      const angle = -135 + (c.pct / 100) * 270;
      const rad = angle * Math.PI / 180;
      const nx = 100 + 50 * Math.cos(rad);
      const ny = 100 + 50 * Math.sin(rad);
      const col = c.pct >= 80 ? c.colorGood : c.pct >= 50 ? c.colorWarn : c.colorBad;
      // Build arc ticks
      let ticks = '';
      for (let i = 0; i <= 10; i++) {
        const a = (-135 + i * 27) * Math.PI / 180;
        const x1 = 100 + 60 * Math.cos(a), y1 = 100 + 60 * Math.sin(a);
        const x2 = 100 + 68 * Math.cos(a), y2 = 100 + 68 * Math.sin(a);
        ticks += `<line x1='${x1}' y1='${y1}' x2='${x2}' y2='${y2}' stroke='${tc2}' stroke-width='1.5' stroke-linecap='round'/>`;
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='160' viewBox='0 0 200 160'>
        ${ticks}
        <circle cx='100' cy='100' r='55' stroke='${darkBg?"#2a2a3e":c.color2}' stroke-width='${c.thickness}' fill='none'
          stroke-dasharray='${Math.PI * 55 * 270 / 360}' stroke-dashoffset='0' stroke-linecap='round'
          transform='rotate(135 100 100)'/>
        <line x1='100' y1='100' x2='${nx}' y2='${ny}' stroke='${col}' stroke-width='3' stroke-linecap='round'/>
        <circle cx='100' cy='100' r='5' fill='${col}'/>
        <text x='100' y='140' font-family='Segoe UI, sans-serif' font-size='22' fill='${tc}' text-anchor='middle' font-weight='700'>${c.pct}%</text>
      </svg>`;
    }

    case 'gauge_donut': {
      const r = 55;
      const circ = 2 * Math.PI * r;
      const col = c.pct >= 80 ? c.colorGood : c.pct >= 50 ? c.colorWarn : c.colorBad;
      const remain = 100 - c.pct;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'>
        <circle cx='90' cy='90' r='${r}' stroke='${darkBg?"#2a2a3e":c.color2}' stroke-width='20' fill='none'/>
        <circle cx='90' cy='90' r='${r}' stroke='${col}' stroke-width='20' fill='none'
          stroke-dasharray='${(c.pct/100)*circ} ${circ}' transform='rotate(-90 90 90)'/>
        <text x='90' y='82' font-family='Segoe UI, sans-serif' font-size='28' fill='${tc}' text-anchor='middle' font-weight='700'>${c.pct}%</text>
        <text x='90' y='105' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}' text-anchor='middle'>${remain}% ${currentLang==='uk'?'лишилось':'left'}</text>
      </svg>`;
    }

    case 'gauge_multi': {
      const vals = [c.pct, Math.max(c.pct - 20, 5), Math.max(c.pct - 35, 5)];
      const colors = [c.color1, c.colorGood, c.colorWarn];
      const labels = ['A', 'B', 'C'];
      let rings = '';
      vals.forEach((v, i) => {
        const r = 55 - i * 18;
        const circ = 2 * Math.PI * r;
        rings += `<circle cx='90' cy='90' r='${r}' stroke='${darkBg?"#2a2a3e":c.color2}' stroke-width='10' fill='none'/>`;
        rings += `<circle cx='90' cy='90' r='${r}' stroke='${colors[i]}' stroke-width='10' fill='none'
          stroke-dasharray='${(v/100)*circ} ${circ}' stroke-linecap='round' transform='rotate(-90 90 90)'/>`;
      });
      return `<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'>
        ${rings}
        <text x='90' y='95' font-family='Segoe UI, sans-serif' font-size='14' fill='${tc}' text-anchor='middle' font-weight='600'>${c.pct}%</text>
      </svg>`;
    }

    // ========== PROGRESS ==========
    case 'progress_linear': {
      const w = 260;
      const fill = (c.pct / 100) * w;
      const col = c.pct >= 80 ? c.colorGood : c.pct >= 50 ? c.color1 : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='60' viewBox='0 0 300 60'>
        <text x='20' y='20' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' font-weight='500'>${currentLang==='uk'?'Прогрес':'Progress'}</text>
        <text x='280' y='20' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc}' text-anchor='end' font-weight='600'>${c.pct}%</text>
        <rect x='20' y='32' width='${w}' height='${c.thickness}' rx='${c.thickness/2}' fill='${darkBg?"#2a2a3e":c.color2}'/>
        <rect x='20' y='32' width='${Math.max(fill, 0)}' height='${c.thickness}' rx='${c.thickness/2}' fill='${col}'/>
      </svg>`;
    }

    case 'progress_stepped': {
      const steps = 5;
      const filled = Math.ceil((c.pct / 100) * steps);
      let bars = '';
      for (let i = 0; i < steps; i++) {
        const x = 20 + i * 54;
        const active = i < filled;
        const col = active ? (c.pct >= 80 ? c.colorGood : c.color1) : (darkBg ? '#2a2a3e' : c.color2);
        bars += `<rect x='${x}' y='30' width='48' height='${c.thickness}' rx='${c.thickness/2}' fill='${col}'/>`;
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='60' viewBox='0 0 300 60'>
        <text x='20' y='20' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}' font-weight='500'>${currentLang==='uk'?'Крок':'Step'} ${filled}/${steps}</text>
        <text x='280' y='20' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc}' text-anchor='end' font-weight='600'>${c.pct}%</text>
        ${bars}
      </svg>`;
    }

    case 'progress_gradient': {
      const w = 260;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='60' viewBox='0 0 300 60'>
        <defs>
          <linearGradient id='pg' x1='0%' y1='0%' x2='100%' y2='0%'>
            <stop offset='0%' stop-color='${c.colorBad}'/>
            <stop offset='50%' stop-color='${c.colorWarn}'/>
            <stop offset='100%' stop-color='${c.colorGood}'/>
          </linearGradient>
          <clipPath id='pgc'><rect x='20' y='32' width='${(c.pct/100)*w}' height='${c.thickness}' rx='${c.thickness/2}'/></clipPath>
        </defs>
        <text x='20' y='20' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc2}'>${currentLang==='uk'?'Прогрес':'Progress'}</text>
        <text x='280' y='20' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc}' text-anchor='end' font-weight='600'>${c.pct}%</text>
        <rect x='20' y='32' width='${w}' height='${c.thickness}' rx='${c.thickness/2}' fill='${darkBg?"#2a2a3e":c.color2}'/>
        <rect x='20' y='32' width='${w}' height='${c.thickness}' rx='${c.thickness/2}' fill='url(#pg)' clip-path='url(#pgc)'/>
      </svg>`;
    }

    case 'progress_segmented': {
      const segs = 10;
      const filled = Math.round((c.pct / 100) * segs);
      let rects = '';
      for (let i = 0; i < segs; i++) {
        const x = 20 + i * 26;
        const active = i < filled;
        rects += `<rect x='${x}' y='30' width='22' height='${c.thickness}' rx='3' fill='${active ? c.color1 : (darkBg?"#2a2a3e":c.color2)}' opacity='${active ? 1 : 0.4}'/>`;
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='60' viewBox='0 0 300 60'>
        <text x='20' y='20' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc}' font-weight='600'>${c.pct}%</text>
        ${rects}
      </svg>`;
    }

    case 'progress_battery': {
      const col = c.pct >= 60 ? c.colorGood : c.pct >= 25 ? c.colorWarn : c.colorBad;
      const w = 80;
      const fill = (c.pct / 100) * w;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='60' viewBox='0 0 120 60'>
        <rect x='10' y='12' width='${w+10}' height='36' rx='5' stroke='${tc2}' stroke-width='2' fill='none'/>
        <rect x='${w+20}' y='22' width='6' height='16' rx='2' fill='${tc2}'/>
        <rect x='15' y='17' width='${fill}' height='26' rx='3' fill='${col}'/>
        <text x='55' y='36' font-family='Segoe UI, sans-serif' font-size='14' fill='${c.pct > 50 ? "#fff" : tc}' text-anchor='middle' font-weight='600'>${c.pct}%</text>
      </svg>`;
    }

    // ========== CHARTS ==========
    case 'chart_bar_h': {
      const pct = Math.min(Math.round(c.value / c.target * 100), 100);
      const fv = c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const w = 200;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='50' viewBox='0 0 300 50'>
        <rect x='10' y='12' width='${w}' height='26' rx='4' fill='${darkBg?"#2a2a3e":c.color2}'/>
        <rect x='10' y='12' width='${(pct/100)*w}' height='26' rx='4' fill='${c.color1}'/>
        <text x='${10+(pct/100)*w + 8}' y='30' font-family='Segoe UI, sans-serif' font-size='12' fill='${tc}' font-weight='600'>$${fv}</text>
      </svg>`;
    }

    case 'chart_bar_v': {
      const vals = [65, 80, c.pct, 45, 90];
      const maxV = Math.max(...vals);
      let bars = '';
      vals.forEach((v, i) => {
        const h = (v / maxV) * 100;
        bars += `<rect x='${20 + i * 50}' y='${120 - h}' width='30' height='${h}' rx='4' fill='${i===2 ? c.color1 : (darkBg?"#2a2a3e":c.color2)}'/>`;
        bars += `<text x='${35 + i * 50}' y='${115 - h}' font-family='Segoe UI, sans-serif' font-size='10' fill='${tc2}' text-anchor='middle'>${v}</text>`;
      });
      return `<svg xmlns='http://www.w3.org/2000/svg' width='290' height='140' viewBox='0 0 290 140'>
        ${bars}
        <line x1='15' y1='120' x2='275' y2='120' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1'/>
      </svg>`;
    }

    case 'chart_bullet': {
      const pct = Math.min(Math.round(c.value / c.target * 100), 150);
      const fv = c.value >= 1000 ? (c.value/1000).toFixed(0)+'K' : c.value;
      const w = 240;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='60' viewBox='0 0 300 60'>
        <rect x='20' y='18' width='${w}' height='24' rx='3' fill='${darkBg?"#2a2a3e":"#e2e8f0"}'/>
        <rect x='20' y='18' width='${Math.min(w * 0.75, w)}' height='24' rx='3' fill='${darkBg?"#353555":c.color2}'/>
        <rect x='20' y='22' width='${Math.min((pct/100)*w, w)}' height='16' rx='2' fill='${c.color1}'/>
        <line x1='${20 + w * (c.target / (c.target * 1.5))}' y1='14' x2='${20 + w * (c.target / (c.target * 1.5))}' y2='46' stroke='${tc}' stroke-width='2'/>
        <text x='20' y='55' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}'>$${fv} / $${c.target >= 1000 ? (c.target/1000).toFixed(0)+'K' : c.target}</text>
      </svg>`;
    }

    case 'chart_waterfall': {
      const vals = [100, -20, 35, -10, 15];
      let cum = 0;
      let bars = '';
      vals.forEach((v, i) => {
        const prevCum = cum;
        cum += v;
        const y = v >= 0 ? 100 - cum * 0.6 : 100 - prevCum * 0.6;
        const h = Math.abs(v) * 0.6;
        bars += `<rect x='${20 + i * 50}' y='${y}' width='35' height='${h}' rx='2' fill='${v >= 0 ? c.colorGood : c.colorBad}'/>`;
        bars += `<text x='${37 + i * 50}' y='${y - 5}' font-family='Segoe UI, sans-serif' font-size='10' fill='${tc2}' text-anchor='middle'>${v >= 0 ? "+" : ""}${v}</text>`;
      });
      return `<svg xmlns='http://www.w3.org/2000/svg' width='290' height='130' viewBox='0 0 290 130'>
        <line x1='15' y1='100' x2='275' y2='100' stroke='${darkBg?"#2a2a3e":"#e2e8f0"}' stroke-width='1' stroke-dasharray='4'/>
        ${bars}
      </svg>`;
    }

    case 'chart_sparkline': {
      const pts = [30, 50, 35, 70, 55, 80, 60, 75, 90, c.pct];
      const maxP = Math.max(...pts, 1);
      const months = currentLang==='uk'
        ? ['Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру']
        : ['Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const W = 300, H = 120, padL = 10, padR = 30, padT = 12, padB = 22;
      const gW = W - padL - padR, gH = H - padT - padB;
      const px = (i) => padL + (i / 9) * gW;
      const py = (v) => padT + gH - (v / maxP) * gH;
      const path = pts.map((p, i) => `${i===0?'M':'L'}${px(i).toFixed(1)},${py(p).toFixed(1)}`).join(' ');
      const areaPath = path + ` L${px(9).toFixed(1)},${padT + gH} L${px(0).toFixed(1)},${padT + gH} Z`;
      const lastX = px(9), lastYv = py(c.pct);
      // Date labels (first, mid, last)
      let dateLabels = '';
      [0, 4, 9].forEach(i => {
        dateLabels += `<text x='${px(i).toFixed(1)}' y='${H - 4}' font-family='Segoe UI, sans-serif' font-size='9' fill='${tc2}' text-anchor='middle'>${months[i]}</text>`;
      });
      // Grid lines
      let grid = '';
      [0, 0.5, 1].forEach(f => {
        const gy = padT + gH - f * gH;
        grid += `<line x1='${padL}' y1='${gy.toFixed(1)}' x2='${W - padR}' y2='${gy.toFixed(1)}' stroke='${darkBg?"#2a2a3e":"#e8ecf0"}' stroke-width='0.5'/>`;
      });
      return `<svg xmlns='http://www.w3.org/2000/svg' width='${W}' height='${H}' viewBox='0 0 ${W} ${H}'>
        ${grid}
        <path d='${areaPath}' fill='${c.color1}' opacity='0.08'/>
        <path d='${path}' stroke='${c.color1}' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
        <circle cx='${lastX.toFixed(1)}' cy='${lastYv.toFixed(1)}' r='4' fill='${c.color1}'/>
        <text x='${(lastX + 6).toFixed(1)}' y='${(lastYv + 4).toFixed(1)}' font-family='Segoe UI, sans-serif' font-size='11' fill='${c.color1}' font-weight='600'>${c.pct}</text>
        ${dateLabels}
      </svg>`;
    }

    // ========== STATUS ==========
    case 'status_traffic': {
      const status = c.pct >= 70 ? 'good' : c.pct >= 40 ? 'warn' : 'bad';
      return `<svg xmlns='http://www.w3.org/2000/svg' width='50' height='120' viewBox='0 0 50 120'>
        <rect x='5' y='5' width='40' height='110' rx='8' fill='${darkBg?"#1e1e2e":"#1e293b"}'/>
        <circle cx='25' cy='30' r='13' fill='${status==='bad'?c.colorBad:"#374151"}' opacity='${status==='bad'?1:0.3}'/>
        <circle cx='25' cy='60' r='13' fill='${status==='warn'?c.colorWarn:"#374151"}' opacity='${status==='warn'?1:0.3}'/>
        <circle cx='25' cy='90' r='13' fill='${status==='good'?c.colorGood:"#374151"}' opacity='${status==='good'?1:0.3}'/>
      </svg>`;
    }

    case 'status_icon': {
      const status = c.pct >= 70 ? 'good' : c.pct >= 40 ? 'warn' : 'bad';
      const col = status === 'good' ? c.colorGood : status === 'warn' ? c.colorWarn : c.colorBad;
      const icon = status === 'good' ? `<path d='M12 22 L20 30 L38 12' stroke='${col}' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/>` :
                   status === 'warn' ? `<text x='25' y='32' font-family='Segoe UI, sans-serif' font-size='28' fill='${col}' text-anchor='middle' font-weight='700'>!</text>` :
                   `<path d='M14 14 L36 36 M36 14 L14 36' stroke='${col}' stroke-width='4' fill='none' stroke-linecap='round'/>`;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='50' height='50' viewBox='0 0 50 50'>
        <circle cx='25' cy='25' r='22' fill='${col}' opacity='0.12'/>
        ${icon}
      </svg>`;
    }

    case 'status_badge': {
      const status = c.pct >= 70 ? 'good' : c.pct >= 40 ? 'warn' : 'bad';
      const col = status === 'good' ? c.colorGood : status === 'warn' ? c.colorWarn : c.colorBad;
      const txt = status === 'good' ? (currentLang==='uk'?'Добре':'Good') : status === 'warn' ? (currentLang==='uk'?'Увага':'Warning') : (currentLang==='uk'?'Погано':'Bad');
      return `<svg xmlns='http://www.w3.org/2000/svg' width='120' height='36' viewBox='0 0 120 36'>
        <rect x='2' y='2' width='116' height='32' rx='16' fill='${col}' opacity='0.15'/>
        <circle cx='20' cy='18' r='5' fill='${col}'/>
        <text x='32' y='23' font-family='Segoe UI, sans-serif' font-size='13' fill='${col}' font-weight='600'>${txt}</text>
      </svg>`;
    }

    case 'status_dot': {
      const status = c.pct >= 70 ? 'good' : c.pct >= 40 ? 'warn' : 'bad';
      const col = status === 'good' ? c.colorGood : status === 'warn' ? c.colorWarn : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'>
        <circle cx='15' cy='15' r='10' fill='${col}' opacity='0.2'/>
        <circle cx='15' cy='15' r='5' fill='${col}'/>
      </svg>`;
    }

    case 'status_flag': {
      const status = c.pct >= 70 ? 'good' : c.pct >= 40 ? 'warn' : 'bad';
      const col = status === 'good' ? c.colorGood : status === 'warn' ? c.colorWarn : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='40' height='50' viewBox='0 0 40 50'>
        <line x1='8' y1='5' x2='8' y2='45' stroke='${tc2}' stroke-width='2' stroke-linecap='round'/>
        <path d='M8 5 L35 13 L8 25 Z' fill='${col}'/>
      </svg>`;
    }

    // ========== RATING ==========
    case 'rating_stars': {
      let stars = '';
      for (let i = 0; i < c.count; i++) {
        const filled = i < Math.floor(c.rating);
        const half = !filled && i < c.rating;
        const col = filled || half ? c.color1 : (darkBg ? '#2a2a3e' : c.color2);
        const x = 10 + i * 30;
        stars += `<path d='M${x+12} 5 L${x+15} 11 L${x+22} 12 L${x+17} 17 L${x+18} 24 L${x+12} 21 L${x+6} 24 L${x+7} 17 L${x+2} 12 L${x+9} 11 Z' fill='${col}'/>`;
        if (half) {
          stars += `<clipPath id='half${i}'><rect x='${x}' y='0' width='14' height='30'/></clipPath>`;
          stars += `<path d='M${x+12} 5 L${x+15} 11 L${x+22} 12 L${x+17} 17 L${x+18} 24 L${x+12} 21 L${x+6} 24 L${x+7} 17 L${x+2} 12 L${x+9} 11 Z' fill='${c.color1}' clip-path='url(#half${i})'/>`;
        }
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='${10 + c.count * 30}' height='30' viewBox='0 0 ${10 + c.count * 30} 30'>
        <defs>${''}</defs>
        ${stars}
      </svg>`;
    }

    case 'rating_hearts': {
      let hearts = '';
      for (let i = 0; i < c.count; i++) {
        const filled = i < Math.floor(c.rating);
        const col = filled ? c.color1 : (darkBg ? '#2a2a3e' : c.color2);
        const x = 5 + i * 28;
        hearts += `<path d='M${x+12} 22 C${x+4} 16 ${x} 10 ${x+4} 6 C${x+7} 3 ${x+12} 6 ${x+12} 8 C${x+12} 6 ${x+17} 3 ${x+20} 6 C${x+24} 10 ${x+20} 16 ${x+12} 22 Z' fill='${col}'/>`;
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='${5 + c.count * 28 + 5}' height='28' viewBox='0 0 ${10 + c.count * 28} 28'>
        ${hearts}
      </svg>`;
    }

    case 'rating_bars': {
      let bars = '';
      for (let i = 0; i < c.count; i++) {
        const filled = i < Math.floor(c.rating);
        const col = filled ? c.color1 : (darkBg ? '#2a2a3e' : c.color2);
        bars += `<rect x='${8 + i * 14}' y='${filled ? 5 : 12}' width='10' height='${filled ? 25 : 18}' rx='3' fill='${col}'/>`;
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='${8 + c.count * 14 + 5}' height='35' viewBox='0 0 ${13 + c.count * 14} 35'>
        ${bars}
      </svg>`;
    }

    case 'rating_numeric': {
      const col = c.rating >= 4 ? c.colorGood : c.rating >= 2.5 ? c.colorWarn : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='110' height='50' viewBox='0 0 110 50'>
        <rect x='5' y='5' width='100' height='40' rx='8' fill='${col}' opacity='0.12'/>
        <text x='55' y='33' font-family='Segoe UI, sans-serif' font-size='22' fill='${col}' text-anchor='middle' font-weight='700'>${c.rating.toFixed(1)}</text>
        <text x='82' y='26' font-family='Segoe UI, sans-serif' font-size='10' fill='${tc2}'>/${c.count}</text>
      </svg>`;
    }

    case 'rating_emoji': {
      const emoji = c.rating >= 4 ? '😊' : c.rating >= 3 ? '😐' : c.rating >= 2 ? '😟' : '😢';
      return `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'>
        <text x='30' y='42' font-family='Segoe UI Emoji, sans-serif' font-size='36' text-anchor='middle'>${emoji}</text>
      </svg>`;
    }

    // ========== TRENDS ==========
    case 'trend_arrow': {
      const isPos = c.pct >= 0;
      const col = isPos ? c.colorGood : c.colorBad;
      const arrow = isPos
        ? `<path d='M25 35 L25 12 M16 20 L25 10 L34 20' stroke='${col}' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/>`
        : `<path d='M25 10 L25 33 M16 25 L25 35 L34 25' stroke='${col}' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/>`;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='115' height='50' viewBox='0 0 115 50'>
        ${arrow}
        <text x='48' y='30' font-family='Segoe UI, sans-serif' font-size='14' fill='${col}' font-weight='700'>${c.pct >= 0 ? "+" : ""}${c.pct}%</text>
      </svg>`;
    }

    case 'trend_sparkline': {
      const pts = [30, 45, 35, 55, 40, 60, 50, 65, 55, Math.max(c.pct, 5)];
      const maxP = Math.max(...pts, 1);
      const weeks = currentLang==='uk'
        ? ['Т1','Т2','Т3','Т4','Т5','Т6','Т7','Т8','Т9','Т10']
        : ['W1','W2','W3','W4','W5','W6','W7','W8','W9','W10'];
      const W = 300, H = 90, padL = 10, padR = 50, padT = 10, padB = 20;
      const gW = W - padL - padR, gH = H - padT - padB;
      const px = (i) => padL + (i / 9) * gW;
      const py = (v) => padT + gH - (v / maxP) * gH;
      const path = pts.map((p, i) => `${i===0?'M':'L'}${px(i).toFixed(1)},${py(p).toFixed(1)}`).join(' ');
      const areaPath = path + ` L${px(9).toFixed(1)},${padT + gH} L${px(0).toFixed(1)},${padT + gH} Z`;
      const lastY = py(c.pct);
      const delta = c.pct - pts[8];
      const isUp = delta >= 0;
      const col = isUp ? c.colorGood : c.colorBad;
      // Date labels
      let dateLabels = '';
      [0, 4, 9].forEach(i => {
        dateLabels += `<text x='${px(i).toFixed(1)}' y='${H - 3}' font-family='Segoe UI, sans-serif' font-size='8' fill='${tc2}' text-anchor='middle'>${weeks[i]}</text>`;
      });
      // Delta badge on right
      const badgeY = lastY - 6;
      const arrow = isUp ? '▲' : '▼';
      return `<svg xmlns='http://www.w3.org/2000/svg' width='${W}' height='${H}' viewBox='0 0 ${W} ${H}'>
        <path d='${areaPath}' fill='${col}' opacity='0.06'/>
        <path d='${path}' stroke='${col}' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
        <circle cx='${px(9).toFixed(1)}' cy='${lastY.toFixed(1)}' r='3.5' fill='${col}'/>
        <rect x='${W - padR + 6}' y='${Math.max(badgeY, 6).toFixed(1)}' width='40' height='20' rx='4' fill='${col}' opacity='0.12'/>
        <text x='${W - padR + 26}' y='${(Math.max(badgeY, 6) + 14).toFixed(1)}' font-family='Segoe UI, sans-serif' font-size='10' fill='${col}' text-anchor='middle' font-weight='600'>${arrow}${Math.abs(delta)}</text>
        ${dateLabels}
      </svg>`;
    }

    case 'trend_delta': {
      const isPos = c.pct >= 0;
      const col = isPos ? c.colorGood : c.colorBad;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='130' height='45' viewBox='0 0 130 45'>
        <rect x='3' y='5' width='124' height='35' rx='8' fill='${col}' opacity='0.1'/>
        <text x='15' y='28' font-family='Segoe UI, sans-serif' font-size='15' fill='${col}' font-weight='700'>${isPos ? "▲" : "▼"} ${Math.abs(c.pct)}%</text>
        <text x='80' y='28' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}'>${currentLang==='uk'?'зміна':'change'}</text>
      </svg>`;
    }

    case 'trend_flame': {
      const intensity = Math.min(c.pct / 100, 1);
      const h = 30 + intensity * 30;
      const col = c.pct >= 80 ? '#ef4444' : c.pct >= 50 ? c.color1 : '#64748b';
      return `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='70' viewBox='0 0 60 70'>
        <path d='M30 ${65 - h} C20 ${55 - h * 0.5} 12 40 15 52 C17 60 22 65 30 65 C38 65 43 60 45 52 C48 40 40 ${55 - h * 0.5} 30 ${65 - h} Z' fill='${col}' opacity='0.8'/>
        <path d='M30 ${65 - h * 0.5} C25 ${60 - h * 0.3} 22 50 24 56 C26 62 28 65 30 65 C32 65 34 62 36 56 C38 50 35 ${60 - h * 0.3} 30 ${65 - h * 0.5} Z' fill='${c.colorWarn}' opacity='0.8'/>
        <text x='30' y='60' font-family='Segoe UI, sans-serif' font-size='10' fill='white' text-anchor='middle' font-weight='700'>${c.pct}%</text>
      </svg>`;
    }

    // ========== ADVANCED ==========
    case 'adv_thermometer': {
      const h = (c.pct / 100) * 100;
      const col = c.pct >= 80 ? c.colorBad : c.pct >= 50 ? c.colorWarn : c.colorGood;
      return `<svg xmlns='http://www.w3.org/2000/svg' width='90' height='160' viewBox='0 0 90 160'>
        <rect x='20' y='10' width='20' height='110' rx='10' fill='${darkBg?"#2a2a3e":c.color2}'/>
        <circle cx='30' cy='135' r='16' fill='${darkBg?"#2a2a3e":c.color2}'/>
        <rect x='22' y='${120 - h}' width='16' height='${h}' rx='8' fill='${col}'/>
        <circle cx='30' cy='135' r='12' fill='${col}'/>
        <text x='30' y='139' font-family='Segoe UI, sans-serif' font-size='9' fill='white' text-anchor='middle' font-weight='600'>${c.pct}°</text>
        ${[0, 25, 50, 75, 100].map(v => `<line x1='42' y1='${120 - v}' x2='48' y2='${120 - v}' stroke='${tc2}' stroke-width='1'/><text x='52' y='${123 - v}' font-family='Segoe UI, sans-serif' font-size='9' fill='${tc2}'>${v}</text>`).join('')}
      </svg>`;
    }

    case 'adv_funnel': {
      const stages = [100, 75, 55, 35, 20];
      const colors = [c.color1, c.colorGood, c.colorWarn, c.color1, c.colorBad];
      let rects = '';
      stages.forEach((s, i) => {
        const w = s * 2;
        const x = (220 - w) / 2 + 10;
        rects += `<rect x='${x}' y='${10 + i * 28}' width='${w}' height='22' rx='3' fill='${colors[i]}' opacity='0.8'/>`;
        rects += `<text x='120' y='${25 + i * 28}' font-family='Segoe UI, sans-serif' font-size='11' fill='white' text-anchor='middle' font-weight='600'>${s}%</text>`;
      });
      return `<svg xmlns='http://www.w3.org/2000/svg' width='240' height='160' viewBox='0 0 240 160'>
        ${rects}
      </svg>`;
    }

    case 'adv_waffle': {
      const total = 100;
      const filled = Math.round(c.pct);
      let cells = '';
      for (let row = 0; row < 10; row++) {
        for (let col2 = 0; col2 < 10; col2++) {
          const idx = row * 10 + col2;
          const active = idx < filled;
          cells += `<rect x='${5 + col2 * 16}' y='${5 + row * 16}' width='13' height='13' rx='2' fill='${active ? c.color1 : (darkBg?"#2a2a3e":c.color2)}' opacity='${active ? 0.9 : 0.3}'/>`;
        }
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='170' height='185' viewBox='0 0 170 185'>
        ${cells}
        <text x='85' y='178' font-family='Segoe UI, sans-serif' font-size='13' fill='${tc}' text-anchor='middle' font-weight='600'>${c.pct}%</text>
      </svg>`;
    }

    case 'adv_pictogram': {
      const total = 10;
      const filled = Math.round((c.pct / 100) * total);
      let people = '';
      for (let i = 0; i < total; i++) {
        const active = i < filled;
        const x = 10 + (i % 5) * 36;
        const y = i < 5 ? 10 : 55;
        const col = active ? c.colorGood : (darkBg ? '#2a2a3e' : c.color2);
        people += `<circle cx='${x + 10}' cy='${y + 8}' r='7' fill='${col}'/>`;
        people += `<path d='M${x} ${y + 38} C${x} ${y + 22} ${x + 20} ${y + 22} ${x + 20} ${y + 38}' fill='${col}'/>`;
      }
      return `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='110' viewBox='0 0 200 110'>
        ${people}
        <text x='190' y='60' font-family='Segoe UI, sans-serif' font-size='16' fill='${tc}' text-anchor='end' font-weight='700'>${c.pct}%</text>
      </svg>`;
    }

    case 'adv_radial_bar': {
      const vals = [c.pct, Math.max(c.pct - 15, 5), Math.max(c.pct - 30, 5), Math.max(c.pct - 45, 5)];
      const colors = [c.color1, c.colorGood, c.colorWarn, c.colorBad];
      const labels = ['Q1', 'Q2', 'Q3', 'Q4'];
      let arcs = '';
      vals.forEach((v, i) => {
        const r = 65 - i * 14;
        const circ = 2 * Math.PI * r;
        arcs += `<circle cx='90' cy='90' r='${r}' stroke='${darkBg?"#2a2a3e":c.color2}' stroke-width='8' fill='none'/>`;
        arcs += `<circle cx='90' cy='90' r='${r}' stroke='${colors[i]}' stroke-width='8' fill='none'
          stroke-dasharray='${(v/100)*circ} ${circ}' stroke-linecap='round' transform='rotate(-90 90 90)'/>`;
      });
      let legend = '';
      labels.forEach((l, i) => {
        legend += `<circle cx='195' cy='${35 + i * 20}' r='4' fill='${colors[i]}'/>`;
        legend += `<text x='205' y='${39 + i * 20}' font-family='Segoe UI, sans-serif' font-size='11' fill='${tc2}'>${l} ${vals[i]}%</text>`;
      });
      return `<svg xmlns='http://www.w3.org/2000/svg' width='260' height='180' viewBox='0 0 260 180'>
        ${arcs}${legend}
      </svg>`;
    }

    default:
      return `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='100' viewBox='0 0 200 100'>
        <text x='100' y='55' font-family='Segoe UI, sans-serif' font-size='14' fill='${tc}' text-anchor='middle'>Visual: ${vId}</text>
      </svg>`;
  }
}

// ============================================================
//  DAX GENERATOR
// ============================================================
function generateDAX() {
  const v = currentVisual;
  const c = controls;
  const name = t('visuals.' + v);

  let dax = '';

  // Sparkline visuals get special date-based DAX
  if (v === 'chart_sparkline' || v === 'trend_sparkline') {
    dax = `${name} = 
VAR _dates = SELECTCOLUMNS(
    TOPN(10, 'Calendar', 'Calendar'[Date], DESC),
    "D", 'Calendar'[Date],
    "V", CALCULATE([Your Measure])
)
VAR _maxV = MAXX(_dates, [V])
VAR _minV = MINX(_dates, [V])
VAR _range = _maxV - _minV
VAR _W = 300  VAR _H = ${v === 'chart_sparkline' ? 120 : 90}
VAR _padL = 10  VAR _padR = ${v === 'chart_sparkline' ? 30 : 50}
VAR _padT = ${v === 'chart_sparkline' ? 12 : 10}  VAR _padB = ${v === 'chart_sparkline' ? 22 : 20}
VAR _gW = _W - _padL - _padR
VAR _gH = _H - _padT - _padB
VAR _n = COUNTROWS(_dates) - 1
VAR _points = CONCATENATEX(
    ADDCOLUMNS(
        _dates,
        "idx", RANKX(_dates, [D], , ASC) - 1,
        "px", _padL + (RANKX(_dates, [D], , ASC) - 1) / _n * _gW,
        "py", _padT + _gH - DIVIDE([V] - _minV, _range, 0) * _gH
    ),
    IF([idx] = 0, "M", "L") & FORMAT([px], "0.0") & "," & FORMAT([py], "0.0"),
    " ",
    [D], ASC
)
VAR _lastV = MAXX(TOPN(1, _dates, [D], DESC), [V])
VAR _color = "${c.color1}"
VAR _svg =
    "data:image/svg+xml;utf8," &
    "<svg xmlns='http://www.w3.org/2000/svg' width='" & _W & "' height='" & _H & "' viewBox='0 0 " & _W & " " & _H & "'>" &
    "<path d='" & _points & "' stroke='" & _color & "' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/>" &
    "</svg>"
RETURN _svg

// ─── Integration ───
// 1. Create 'Calendar' table with [Date] column (or use your date table)
// 2. Replace [Your Measure] with your actual measure
// 3. New Measure → paste → Data Category → Image URL
// 4. Use in Table/Matrix/Card visual
// 5. Adjust TOPN(10,...) to change number of data points`;

  } else {
    // Standard DAX for all other visuals
    const svgRaw = generateSVG(v, c);
    const svgClean = svgRaw.replace(/\n\s*/g, ' ').trim();

    dax = `${name} = \nVAR _value = [Your Measure]\nVAR _target = [Your Target]\nVAR _pct = DIVIDE(_value, _target, 0) * 100\n`;

    if (v.startsWith('status_') || v.startsWith('rating_')) {
      dax += `VAR _color = \n    SWITCH(\n        TRUE(),\n        _pct >= 70, "${c.colorGood}",\n        _pct >= 40, "${c.colorWarn}",\n        "${c.colorBad}"\n    )\n`;
    } else if (v.startsWith('gauge_') || v.startsWith('progress_')) {
      dax += `VAR _pctClamped = MIN(MAX(_pct, 0), 100)\nVAR _color = \n    SWITCH(\n        TRUE(),\n        _pct >= 80, "${c.colorGood}",\n        _pct >= 50, "${c.colorWarn || '#fbbf24'}",\n        "${c.colorBad}"\n    )\n`;
    }

    dax += `VAR _svg = \n    "data:image/svg+xml;utf8,${svgClean}"\nRETURN _svg`;
    dax += `\n\n// ─── Integration ───\n// 1. Create New Measure → paste this code\n// 2. Measure Tools → Data Category → Image URL\n// 3. Add Table/Matrix/Card → drag measure to Values\n// 4. Replace [Your Measure] & [Your Target] with your actual measures`;
  }

  document.getElementById('daxOutput').value = dax;
}

// ============================================================
//  RENDER ALL
// ============================================================
function renderPreview() {
  const svg = generateSVG(currentVisual, controls);
  document.getElementById('svgContainer').innerHTML = svg;
  document.getElementById('visualName').textContent = t('visuals.' + currentVisual);
}

function renderAll() {
  document.getElementById('previewTitle').textContent = t('preview');
  document.getElementById('controlsTitle').textContent = t('controls');
  renderControls();
  renderPreview();
  generateDAX();
}

function copyDAX() {
  const ta = document.getElementById('daxOutput');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = t('copied');
    btn.classList.add('copy-success');
    setTimeout(() => {
      btn.textContent = t('copy');
      btn.classList.remove('copy-success');
    }, 2000);
  });
}

// ============================================================
//  INIT
// ============================================================
controls = getDefaults(currentVisual);
renderSidebar();
renderAll();
</script>
